<div class="app-wrapper">
  <app-navbar-show></app-navbar-show>
  <main>
    <router-outlet></router-outlet>
  </main>
  <app-footer></app-footer>
  @if (systemMessageService.message()) {
    <app-notification-toast
      [isError]="systemMessageService.isError()"
      [message]="systemMessageService.message()"
      (onClose)="systemMessageService.clear()"
    ></app-notification-toast>
  }
</div>
