<form action="">
    <h1>Regístrese</h1>
    <label for="email">Correo electronico:</label>
    <input type="email" id="email" [formField]="loginForm.email"><br>
    <label for="password">Contraseña:</label>
    <input type="password" id="password" [formField]="loginForm.password"><br>
    <label for="repassword">Repetir contraseña:</label>
    <input type="password" id="repassword" [formField]="loginForm.repassword"><br>
    <button type="button" (click)="handleRegister()">Enviar</button>
</form>
